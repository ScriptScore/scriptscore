name: Weekly Security Audit

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Dependency audit
        run: |
          # These advisories currently have no published fixed versions. Keep the
          # audit strict for any new or fixable findings, and remove ignores when
          # upstream patched releases are available. Tracking: #108.
          uv run pip-audit \
            --ignore-vuln PYSEC-2025-146 \
            --ignore-vuln PYSEC-2025-144 \
            --ignore-vuln PYSEC-2025-147 \
            --ignore-vuln PYSEC-2025-145 \
            --ignore-vuln PYSEC-2026-102 \
            --ignore-vuln PYSEC-2026-101 \
            --ignore-vuln PYSEC-2025-210 \
            --ignore-vuln PYSEC-2025-194 \
            --ignore-vuln PYSEC-2025-196 \
            --ignore-vuln PYSEC-2025-195 \
            --ignore-vuln PYSEC-2025-193 \
            --ignore-vuln PYSEC-2025-192 \
            --ignore-vuln PYSEC-2026-139 \
            --ignore-vuln PYSEC-2025-191 \
            --ignore-vuln PYSEC-2025-197 \
            --ignore-vuln PYSEC-2025-189 \
            --ignore-vuln PYSEC-2025-190

      - name: Bandit scan
        run: uv run bandit -q -r src/scriptscore -x tests -ll
