name: DCO

on:
  pull_request:

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check DCO sign-offs
        run: python scripts/check_dco.py origin/${{ github.base_ref }}...HEAD
