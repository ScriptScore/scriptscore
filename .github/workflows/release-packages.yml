name: Desktop Preview Packages
run-name: >-
  Desktop Preview Packages ${{ inputs.channel || 'latest' }}
  ${{ github.event.workflow_run.head_branch || github.ref_name }}
  ${{ github.event.workflow_run.head_sha || github.sha }}

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Preview channel to publish."
        required: false
        default: latest
        type: choice
        options:
          - latest
          - rc
      fast_track:
        description: "Skip expensive quality gates while iterating on package assembly."
        required: false
        default: false
        type: boolean
      package_platform:
        description: "Package platform to build. Use all to build every platform."
        required: false
        default: all
        type: choice
        options:
          - all
          - macos-intel
          - macos-arm64
          - windows-x64
          - linux-x64
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - "release/**"

permissions:
  contents: read

jobs:
  resolve-release:
    name: Resolve release metadata
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    outputs:
      public_version: ${{ steps.metadata.outputs.public_version }}
      msi_version: ${{ steps.metadata.outputs.msi_version }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      latest_tag: ${{ steps.metadata.outputs.latest_tag }}
      release_title: ${{ steps.metadata.outputs.release_title }}
      channel: ${{ steps.metadata.outputs.channel }}
      source_sha: ${{ steps.metadata.outputs.source_sha }}
      source_ref: ${{ steps.metadata.outputs.source_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve generated version
        id: metadata
        env:
          RELEASE_CHANNEL: ${{ inputs.channel || 'latest' }}
          SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          SOURCE_REF: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
        run: |
          base_version=$(
            python3 desktop/scripts/project_release_version.py \
              tauri-version desktop/src-tauri/tauri.conf.json
          )
          python3 desktop/scripts/project_release_version.py resolve \
            --base-version "${base_version}" \
            --channel "${RELEASE_CHANNEL}" \
            --run-number "${GITHUB_RUN_NUMBER}" \
            --source-sha "${SOURCE_SHA}" \
            --source-ref "${SOURCE_REF}" \
            > release-metadata.json
          python3 <<'PY'
          import json
          import os

          metadata = json.loads(open("release-metadata.json", encoding="utf-8").read())
          output_keys = [
              "public_version",
              "msi_version",
              "release_tag",
              "latest_tag",
              "release_title",
              "channel",
              "source_sha",
              "source_ref",
          ]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key in output_keys:
                  print(f"{key}={metadata[key]}", file=output)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("## Release metadata\n\n")
              for key in output_keys:
                  summary.write(f"- `{key}`: `{metadata[key]}`\n")
              summary.write(f"- `source_sha`: `{metadata['source_sha']}`\n")
              summary.write(f"- `source_ref`: `{metadata['source_ref']}`\n")
          PY

  define-package-matrix:
    name: Define package matrix
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      package_platform: ${{ steps.matrix.outputs.package_platform }}
    steps:
      - name: Select package matrix
        id: matrix
        shell: bash
        run: |
          python3 <<'PY'
          import json
          import os

          packages = [
              {
                  "label": "macos-intel",
                  "runner": "macos-15-intel",
                  "rust_target": "x86_64-apple-darwin",
                  "python_target": "x86_64-apple-darwin",
                  "bundles": "dmg",
                  "artifact_name": "scriptscore-package-macos-intel",
              },
              {
                  "label": "macos-arm64",
                  "runner": "macos-15",
                  "rust_target": "aarch64-apple-darwin",
                  "python_target": "aarch64-apple-darwin",
                  "bundles": "dmg",
                  "artifact_name": "scriptscore-package-macos-arm64",
              },
              {
                  "label": "windows-x64",
                  "runner": "windows-latest",
                  "rust_target": "x86_64-pc-windows-msvc",
                  "python_target": "x86_64-pc-windows-msvc-shared",
                  "bundles": "nsis,msi",
                  "artifact_name": "scriptscore-package-windows-x64",
              },
              {
                  "label": "linux-x64",
                  "runner": "ubuntu-22.04",
                  "rust_target": "x86_64-unknown-linux-gnu",
                  "python_target": "x86_64-unknown-linux-gnu",
                  "bundles": "appimage,deb,rpm",
                  "artifact_name": "scriptscore-package-linux-x64",
              },
          ]

          selected = os.environ.get("PACKAGE_PLATFORM", "all")
          if selected != "all":
              packages = [package for package in packages if package["label"] == selected]
          if not packages:
              raise SystemExit(f"Unknown package platform: {selected}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"matrix={json.dumps({'include': packages}, separators=(',', ':'))}", file=output)
              print(f"package_platform={selected}", file=output)
          PY
        env:
          PACKAGE_PLATFORM: ${{ inputs.package_platform || 'all' }}

  prepare-paddle-models:
    name: Prepare Paddle models
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Install Paddle model resources
        run: |
          cli/scripts/install_paddle_models.sh cli/models/paddle
          test -f cli/models/paddle/det/inference.yml
          test -f cli/models/paddle/det/inference.pdiparams
          test -f cli/models/paddle/rec/inference.yml
          test -f cli/models/paddle/rec/inference.pdiparams

      - name: Pack Paddle model resources
        run: tar -czf paddle-models.tar.gz -C cli/models paddle

      - name: Upload Paddle model resources
        uses: actions/upload-artifact@v7
        with:
          name: scriptscore-paddle-models
          if-no-files-found: error
          path: paddle-models.tar.gz

  package:
    name: ${{ matrix.label }}
    needs:
      - resolve-release
      - define-package-matrix
      - prepare-paddle-models
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-package-matrix.outputs.matrix) }}
    env:
      SCRIPTSCORE_RELEASE_VERSION: ${{ needs.resolve-release.outputs.public_version }}
      SCRIPTSCORE_RELEASE_MSI_VERSION: ${{ needs.resolve-release.outputs.msi_version }}
      SCRIPTSCORE_DESKTOP_BUNDLES: ${{ matrix.bundles }}
      SCRIPTSCORE_DESKTOP_TARGET: ${{ matrix.rust_target }}
      SCRIPTSCORE_DESKTOP_PORTABLE_PYTHON_TARGET: ${{ matrix.python_target }}
      SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_NAME: paddlepaddle-3.3.1-cp312-cp312-macosx_11_0_x86_64.whl
      SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_REPOSITORY: ${{ secrets.SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_REPOSITORY || vars.SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_REPOSITORY }}
      SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_RELEASE_TAG: ${{ secrets.SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_RELEASE_TAG || vars.SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_RELEASE_TAG }}
      SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_URL: ${{ secrets.SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_URL || vars.SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_URL }}
      SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_SHA256: ${{ secrets.SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_SHA256 || vars.SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_SHA256 }}
      SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_TOKEN: ${{ secrets.SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_TOKEN || secrets.SCRIPTSCORE_PYTHON_WHEELS_READ_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.rust_target }}
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: scriptscore-v1-rust
          cache-bin: "false"
          workspaces: desktop/src-tauri -> target

      - name: Install Linux package dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            binutils \
            build-essential \
            curl \
            cpio \
            desktop-file-utils \
            dpkg-dev \
            fakeroot \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libfuse2 \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            rpm \
            squashfs-tools \
            wget \
            zsync

      - name: Install Windows package dependencies
        if: ${{ runner.os == 'Windows' }}
        shell: powershell
        run: choco install lessmsi nsis wixtoolset -y --no-progress

      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: npm ci

      - name: Install CLI fast-quality dependencies
        if: ${{ github.event_name != 'workflow_run' && (github.event_name != 'workflow_dispatch' || !inputs.fast_track) }}
        working-directory: cli
        run: uv sync --only-group ci-runtime --only-group quality --no-install-project --frozen

      - name: Export CLI Python path
        run: |
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            echo "SCRIPTSCORE_PYTHON=${GITHUB_WORKSPACE}\\cli\\.venv\\Scripts\\python.exe" >> "${GITHUB_ENV}"
          else
            echo "SCRIPTSCORE_PYTHON=${GITHUB_WORKSPACE}/cli/.venv/bin/python" >> "${GITHUB_ENV}"
          fi

      - name: Generate release Tauri config
        run: |
          release_config="$(pwd)/desktop/src-tauri/.tauri.release.conf.json"
          python desktop/scripts/project_release_version.py write-tauri-config \
            --source desktop/src-tauri/tauri.conf.json \
            --output "${release_config}" \
            --version "${SCRIPTSCORE_RELEASE_VERSION}"
          echo "SCRIPTSCORE_DESKTOP_TAURI_CONFIG=${release_config}" >> "${GITHUB_ENV}"
          echo "Using generated Tauri config ${release_config}"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            msi_config="$(pwd)/desktop/src-tauri/.tauri.msi.conf.json"
            python desktop/scripts/project_release_version.py write-tauri-config \
              --source desktop/src-tauri/tauri.conf.json \
              --output "${msi_config}" \
              --version "${SCRIPTSCORE_RELEASE_MSI_VERSION}"
            echo "SCRIPTSCORE_DESKTOP_MSI_TAURI_CONFIG=${msi_config}" >> "${GITHUB_ENV}"
            echo "Using generated MSI Tauri config ${msi_config}"
          fi

      - name: Install cargo-tauri
        run: cargo install tauri-cli --version '^2'

      - name: CLI fast-quality gate
        if: ${{ github.event_name != 'workflow_run' && (github.event_name != 'workflow_dispatch' || !inputs.fast_track) }}
        working-directory: cli
        run: |
          uv run --no-sync ruff check .
          uv run --no-sync ruff format --check .
          uv run --no-sync mypy

      - name: Frontend quality gate
        if: ${{ github.event_name != 'workflow_run' && (github.event_name != 'workflow_dispatch' || !inputs.fast_track) }}
        working-directory: desktop/frontend
        run: |
          npm run lint
          npm run check
          npm test

      - name: Prepare Tauri resource directories
        run: |
          mkdir -p desktop/dist/bundled-runtime
          mkdir -p desktop/dist/legal

      - name: Desktop host quality gate
        if: ${{ github.event_name != 'workflow_run' && (github.event_name != 'workflow_dispatch' || !inputs.fast_track) }}
        run: |
          cargo fmt --check --manifest-path desktop/src-tauri/Cargo.toml
          cargo clippy --manifest-path desktop/src-tauri/Cargo.toml --workspace --all-targets --all-features --target "${SCRIPTSCORE_DESKTOP_TARGET}" -- -D warnings
          cargo test --manifest-path desktop/src-tauri/Cargo.toml --target "${SCRIPTSCORE_DESKTOP_TARGET}"

      - name: Download macOS Intel Paddle wheel
        if: ${{ matrix.label == 'macos-intel' }}
        env:
          GH_TOKEN: ${{ secrets.SCRIPTSCORE_PYTHON_WHEELS_READ_TOKEN || secrets.SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_TOKEN }}
        run: |
          if [[ -n "${SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_URL:-}" ]]; then
            echo "Using direct macOS Intel Paddle wheel URL override."
            exit 0
          fi
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "error: SCRIPTSCORE_PYTHON_WHEELS_READ_TOKEN is required to download the private macOS Intel Paddle wheel release asset." >&2
            exit 1
          fi
          if [[ -z "${SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_REPOSITORY:-}" || -z "${SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_RELEASE_TAG:-}" ]]; then
            echo "error: SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_REPOSITORY and SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_RELEASE_TAG must be configured for private release asset download." >&2
            exit 1
          fi
          wheel_dir="$(pwd)/desktop/dist/private-wheels"
          mkdir -p "${wheel_dir}"
          gh release download "${SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_RELEASE_TAG}" \
            --repo "${SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_REPOSITORY}" \
            --pattern "${SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_NAME}" \
            --dir "${wheel_dir}" \
            --clobber
          echo "SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_PATH=${wheel_dir}/${SCRIPTSCORE_MACOS_X86_64_PADDLE_WHEEL_NAME}" >> "${GITHUB_ENV}"

      - name: Stage portable Python runtime
        run: |
          ./desktop/scripts/prepare-portable-python.sh
          echo "SCRIPTSCORE_DESKTOP_PORTABLE_PYTHON_ROOT=$(pwd)/desktop/dist/portable-python" >> "${GITHUB_ENV}"

      - name: Download Paddle model resources
        uses: actions/download-artifact@v7
        with:
          name: scriptscore-paddle-models
          path: desktop/dist/paddle-model-artifact

      - name: Extract Paddle model resources
        run: |
          rm -rf cli/models/paddle
          mkdir -p cli/models
          tar -xzf desktop/dist/paddle-model-artifact/paddle-models.tar.gz -C cli/models
          test -f cli/models/paddle/det/inference.yml
          test -f cli/models/paddle/det/inference.pdiparams
          test -f cli/models/paddle/rec/inference.yml
          test -f cli/models/paddle/rec/inference.pdiparams

      - name: Prepare bundled runtime and legal artifacts
        run: |
          ./desktop/scripts/prepare-bundled-runtime.sh
          ./desktop/scripts/smoke-bundled-runtime.sh
          python desktop/scripts/generate_legal_artifacts.py
          python desktop/scripts/enforce_release_legal_policy.py
          python desktop/scripts/check_scriptscoreplus_boundary.py

      - name: Build Tauri packages
        run: |
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            export DEBUG=1
            export NO_STRIP=true
            export SCRIPTSCORE_DESKTOP_VERBOSE_TAURI=1
          fi
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            export SCRIPTSCORE_DESKTOP_MACOS_PLAIN_DMG_FALLBACK=1
          fi
          ./desktop/scripts/build-desktop-package.sh "${SCRIPTSCORE_DESKTOP_BUNDLES}"

      - name: Smoke AppImage extraction
        if: ${{ runner.os == 'Linux' }}
        run: |
          appimage=$(find desktop/src-tauri/target -type f -name '*.AppImage' | head -n 1)
          test -n "${appimage}"
          chmod +x "${appimage}"
          tmp_dir=$(mktemp -d)
          payload_root="$(pwd)/desktop/dist/package-payload/${{ matrix.label }}"
          rm -rf "${payload_root}"
          mkdir -p "${payload_root}"
          (
            cd "${tmp_dir}"
            set +e
            "${GITHUB_WORKSPACE}/${appimage}" --appimage-extract >/tmp/scriptscore-appimage-extract.log 2>&1
            extract_status=$?
            set -e
            test -d squashfs-root
            if [[ ${extract_status} -ne 0 ]]; then
              echo "warning: AppImage extraction returned ${extract_status} after creating squashfs-root" >&2
              cat /tmp/scriptscore-appimage-extract.log >&2
            fi
            if [[ ! -d squashfs-root/usr ]]; then
              echo "warning: AppImage extraction did not create squashfs-root/usr; verifier will inspect extracted payload" >&2
              find squashfs-root -maxdepth 2 -mindepth 1 -print | sort | sed -n '1,80p' >&2
            fi
            cp -R squashfs-root "${payload_root}/appimage"
          )
          deb=$(find desktop/src-tauri/target -type f -name '*.deb' | head -n 1)
          test -n "${deb}"
          mkdir -p "${payload_root}/deb"
          dpkg-deb -x "${deb}" "${payload_root}/deb"
          rpm=$(find desktop/src-tauri/target -type f -name '*.rpm' | head -n 1)
          test -n "${rpm}"
          mkdir -p "${payload_root}/rpm"
          (
            cd "${payload_root}/rpm"
            set +e
            rpm2cpio "${GITHUB_WORKSPACE}/${rpm}" | cpio -idmu
            rpm_extract_status=$?
            set -e
            test -n "$(find . -mindepth 1 -print -quit)"
            if [[ ${rpm_extract_status} -ne 0 ]]; then
              echo "warning: RPM extraction returned ${rpm_extract_status} after producing files" >&2
            fi
          )

      - name: Mount unsigned preview DMG
        if: ${{ runner.os == 'macOS' }}
        run: |
          dmg=$(find desktop/src-tauri/target -type f -name '*.dmg' | head -n 1)
          test -n "${dmg}"
          mount_dir=$(mktemp -d)
          payload_root="$(pwd)/desktop/dist/package-payload/${{ matrix.label }}"
          mkdir -p "${payload_root}"
          attach_status=1
          for attempt in 1 2 3 4; do
            if hdiutil attach "${dmg}" -mountpoint "${mount_dir}" -nobrowse -readonly; then
              attach_status=0
              break
            fi
            attach_status=$?
            echo "warning: hdiutil attach failed with status ${attach_status}; retrying (${attempt}/4)." >&2
            hdiutil info || true
            sleep $((attempt * 5))
          done
          if [[ ${attach_status} -ne 0 ]]; then
            exit "${attach_status}"
          fi
          app_dir=$(find "${mount_dir}" -maxdepth 2 -type d -name '*.app' -print -quit)
          test -n "${app_dir}"
          ditto "${app_dir}" "${payload_root}/dmg-app"
          hdiutil detach "${mount_dir}" || hdiutil detach -force "${mount_dir}"

      - name: Extract Windows package payloads
        if: ${{ runner.os == 'Windows' }}
        shell: powershell
        run: |
          $payloadRoot = Join-Path (Get-Location) "desktop/dist/package-payload/${{ matrix.label }}"
          $inspectionRoot = Join-Path (Get-Location) "desktop/dist/package-inspection/${{ matrix.label }}"
          New-Item -ItemType Directory -Force -Path $payloadRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $inspectionRoot | Out-Null

          $msi = Get-ChildItem desktop/src-tauri/target -Recurse -Filter *.msi | Select-Object -First 1
          if ($null -eq $msi) { throw "MSI package was not found" }
          $msiPayload = Join-Path $inspectionRoot "msi"
          New-Item -ItemType Directory -Force -Path $msiPayload | Out-Null
          lessmsi.exe x $msi.FullName "$msiPayload\"
          if ($LASTEXITCODE -ne 0) { throw "MSI extraction failed with exit code $LASTEXITCODE" }

          $nsis = Get-ChildItem desktop/src-tauri/target -Recurse -Filter *setup.exe |
            Where-Object { $_.FullName -like "*\bundle\nsis\*" } |
            Select-Object -First 1
          if ($null -eq $nsis) { throw "NSIS package was not found" }
          $nsisPayload = Join-Path $payloadRoot "nsis"
          New-Item -ItemType Directory -Force -Path $nsisPayload | Out-Null
          7z x "-o$nsisPayload" $nsis.FullName | Out-Host
          if ($LASTEXITCODE -ne 0) { throw "NSIS extraction failed with exit code $LASTEXITCODE" }

      - name: Verify package artifacts
        run: |
          verify_args=(
            --label "${{ matrix.label }}"
            --bundles "${SCRIPTSCORE_DESKTOP_BUNDLES}"
            --target-triple "${SCRIPTSCORE_DESKTOP_TARGET}"
          )
          for payload_parent in \
            "desktop/dist/package-payload/${{ matrix.label }}" \
            "desktop/dist/package-inspection/${{ matrix.label }}"
          do
            if [[ -d "${payload_parent}" ]]; then
              while IFS= read -r payload_dir; do
                verify_args+=(--payload-root "${payload_dir}")
              done < <(find "${payload_parent}" -mindepth 1 -maxdepth 1 -type d | sort)
            fi
          done
          python desktop/scripts/verify-release-package-artifacts.py \
            "${verify_args[@]}"

      - name: Stage release assets
        run: |
          python desktop/scripts/project_release_version.py stage-assets \
            --version "${SCRIPTSCORE_RELEASE_VERSION}" \
            --label "${{ matrix.label }}" \
            --bundles "${SCRIPTSCORE_DESKTOP_BUNDLES}" \
            --bundle-root desktop/src-tauri/target \
            --output-dir "desktop/dist/release-assets/${{ matrix.label }}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            desktop/dist/release-assets/${{ matrix.label }}/*
            desktop/dist/release-package-validation/${{ matrix.label }}/SHA256SUMS
            desktop/dist/release-package-validation/${{ matrix.label }}/summary.json

  publish-release-assets:
    name: Publish preview release assets
    needs:
      - resolve-release
      - define-package-matrix
      - package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release.outputs.source_sha }}
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: scriptscore-package-*
          path: release-artifacts
          merge-multiple: true

      - name: Prepare release assets
        env:
          PUBLIC_VERSION: ${{ needs.resolve-release.outputs.public_version }}
        run: |
          python3 <<'PY'
          import hashlib
          import os
          import shutil
          from pathlib import Path

          version = os.environ["PUBLIC_VERSION"]
          source_root = Path("release-artifacts")
          output_dir = Path("release-assets")
          package_suffixes = {".AppImage", ".deb", ".dmg", ".exe", ".msi", ".rpm"}

          if output_dir.exists():
              shutil.rmtree(output_dir)
          output_dir.mkdir()

          staged: list[Path] = []
          for source in sorted(source_root.rglob("*")):
              if not source.is_file() or source.name == "SHA256SUMS":
                  continue
              if source.suffix not in package_suffixes:
                  continue
              if version not in source.name:
                  raise SystemExit(f"Release asset is missing computed version {version}: {source.name}")
              destination = output_dir / source.name
              if destination.exists():
                  raise SystemExit(f"Duplicate release asset name: {source.name}")
              shutil.copy2(source, destination)
              staged.append(destination)

          if not staged:
              raise SystemExit("No release assets were found in downloaded package artifacts.")

          with (output_dir / "SHA256SUMS").open("w", encoding="utf-8") as handle:
              for asset in sorted(staged, key=lambda path: path.name):
                  digest = hashlib.sha256(asset.read_bytes()).hexdigest()
                  handle.write(f"{digest}  {asset.name}\n")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("## Release assets\n\n")
              for asset in sorted(output_dir.iterdir()):
                  summary.write(f"- `{asset.name}`\n")
                  print(asset)
          PY

      - name: Decide whether to publish
        id: publish-guard
        env:
          CHANNEL: ${{ needs.resolve-release.outputs.channel }}
          EVENT_NAME: ${{ github.event_name }}
          PACKAGE_PLATFORM: ${{ needs.define-package-matrix.outputs.package_platform }}
          SOURCE_REF: ${{ needs.resolve-release.outputs.source_ref }}
          SOURCE_SHA: ${{ needs.resolve-release.outputs.source_sha }}
        run: |
          should_publish=true
          reason=""

          if [[ "${CHANNEL}" == "latest" && "${PACKAGE_PLATFORM}" != "all" ]]; then
            should_publish=false
            reason="Skipping ci/latest publish because package_platform=${PACKAGE_PLATFORM} is a partial build."
          fi

          if [[ "${should_publish}" == "true" && "${EVENT_NAME}" == "workflow_run" && "${CHANNEL}" == "latest" ]]; then
            branch_sha=$(git ls-remote origin "refs/heads/${SOURCE_REF}" | awk '{print $1}')
            if [[ -z "${branch_sha}" ]]; then
              should_publish=false
              reason="Skipping ci/latest publish because branch ${SOURCE_REF} no longer exists."
            elif [[ "${branch_sha}" != "${SOURCE_SHA}" ]]; then
              should_publish=false
              reason="Skipping ci/latest publish because ${SOURCE_SHA} is no longer the tip of ${SOURCE_REF} (${branch_sha})."
            fi
          fi

          echo "should_publish=${should_publish}" >> "${GITHUB_OUTPUT}"
          if [[ "${should_publish}" == "false" ]]; then
            echo "${reason}"
            {
              echo "## Preview publish skipped"
              echo
              echo "${reason}"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Create CI-owned release tag
        if: ${{ steps.publish-guard.outputs.should_publish == 'true' }}
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          LATEST_TAG: ${{ needs.resolve-release.outputs.latest_tag }}
          SOURCE_SHA: ${{ needs.resolve-release.outputs.source_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          remote_sha=$(git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | awk '{print $1}')
          if [[ "${RELEASE_TAG}" == "${LATEST_TAG}" ]]; then
            git tag -f "${RELEASE_TAG}" "${SOURCE_SHA}"
            git push --force origin "refs/tags/${RELEASE_TAG}"
            exit 0
          fi

          if [[ -n "${remote_sha}" && "${remote_sha}" != "${SOURCE_SHA}" ]]; then
            echo "error: release tag ${RELEASE_TAG} already points at ${remote_sha}, not ${SOURCE_SHA}" >&2
            exit 1
          fi
          if [[ -z "${remote_sha}" ]]; then
            git tag "${RELEASE_TAG}" "${SOURCE_SHA}"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

          git tag -f "${LATEST_TAG}" "${SOURCE_SHA}"
          git push --force origin "refs/tags/${LATEST_TAG}"

      - name: Create or update preview release
        if: ${{ steps.publish-guard.outputs.should_publish == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          RELEASE_TITLE: ${{ needs.resolve-release.outputs.release_title }}
          PUBLIC_VERSION: ${{ needs.resolve-release.outputs.public_version }}
          CHANNEL: ${{ needs.resolve-release.outputs.channel }}
          SOURCE_SHA: ${{ needs.resolve-release.outputs.source_sha }}
        run: |
          release_notes=$(
            cat <<EOF
          Automated ${CHANNEL} preview build.

          Version: ${PUBLIC_VERSION}
          Commit: ${SOURCE_SHA}
          Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          )
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --prerelease \
              --title "${RELEASE_TITLE}" \
              --notes "${release_notes}"
          else
            gh release create "${RELEASE_TAG}" \
              --prerelease \
              --verify-tag \
              --title "${RELEASE_TITLE}" \
              --notes "${release_notes}"
          fi
          if [[ "${RELEASE_TAG}" == "ci/latest" ]]; then
            while IFS= read -r asset_name; do
              [[ -n "${asset_name}" ]] || continue
              gh release delete-asset "${RELEASE_TAG}" "${asset_name}" -y
            done < <(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name')
          fi
          gh release upload "${RELEASE_TAG}" release-assets/* --clobber
