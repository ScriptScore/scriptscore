# Maintainers must set SONAR_ORGANIZATION and SONAR_PROJECT_KEY in GitHub
# repository variables for the SonarCloud workflow job.
sonar.projectName=ScriptScore Desktop
sonar.sourceEncoding=UTF-8

sonar.sources=desktop/src-tauri/src,desktop/frontend/src/lib,desktop/frontend/src/routes
sonar.tests=desktop/src-tauri/tests,desktop/frontend/src
sonar.test.inclusions=desktop/src-tauri/tests/**/*.rs,desktop/frontend/src/**/*.{test,spec}.{ts,js},desktop/frontend/src/test/**

sonar.javascript.lcov.reportPaths=desktop/frontend/coverage/lcov.info
sonar.rust.lcov.reportPaths=artifacts/coverage/lcov.info
sonar.rust.cargo.manifestPaths=desktop/src-tauri/Cargo.toml
