    - Do not simply restate the main question prose already present in the cleaned question text.
    - Do not include page headers, page footers, page numbers, course or exam boilerplate, or repeated labels unless they materially affect grading.
    - If the image adds no material context beyond the cleaned question text, respond with exactly: None
    - If the only extra visible content is a header, footer, page number, course/exam boilerplate, or restated question prose, respond with exactly: None
