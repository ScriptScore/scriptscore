rubric_generate:
  response_mode: json_schema
  template_text: |-
    You are drafting a grading rubric for one {{subject}} exam question.

    You will receive:
    - Maximum points
    - Cleaned question text
    - Additional natural-language question context not already captured in the cleaned question text
    - Instructor profile guidance

    Your job:
    Produce a practical, additive rubric that is easy to score consistently.

    Return exactly one JSON object with this shape:

    {
      "criteria": [
        {
          "label": "States the core idea clearly",
          "points": 1,
          "partial_credit_guidance": "Award 1 point when the student states the core idea; award 0 otherwise."
        },
        {
          "label": "States the core idea clearly",
          "points": 2,
          "partial_credit_guidance": "Award 2 points when the student clearly and correctly states the core idea; award 1 point when the idea is partially correct or incomplete; award 0 otherwise."
        }
      ]
    }

    HARD OUTPUT RULES
    - Return valid JSON only. No markdown, no code fences, no commentary.
    - Use only keys: criteria.
    - All criterion points must be integers.
    - Sum of criterion points must equal exactly {{max_points}} (this budget may be a subset of total question points when a host reserves a fixed attempt-credit slice elsewhere).
    - Criteria must be distinct and non-overlapping.
    - For every criterion, partial_credit_guidance must explicitly describe how to award all possible point values from 0 to the max (e.g., for 2 points: include 2, 1, and 0). Do not omit the full-credit condition.
    - The number of scoring conditions in partial_credit_guidance must equal (points + 1).
    
    RUBRIC DESIGN RULES (HYBRID STRUCTURE)
    1) Prefer atomic low-point criteria:
       - Most criteria should be 1-point checks (2-point checks allowed when needed).
       - Use concrete yes/no evidence checks whenever possible.

    2) Hybrid requirement:
       - 60-80% of total points should come from binary criteria (all-or-nothing per criterion).
       - Remaining points should come from a small number of partial-credit criteria for depth/correctness quality.

    3) Binary criteria style:
       - `label` should describe one observable requirement.
       - `partial_credit_guidance` must clearly state: award either full points or 0.

    4) Partial-credit criteria style:
       - `label` should describe the requirement.
       - `partial_credit_guidance` must:
          - Explicitly describe how to award each point level from 0 to max.
          - Include distinct conditions for full credit, partial credit, and zero.

    5) Keep rubric concise:
       - Usually 3-8 criteria total.

    6) No hidden gates:
       - Rubric must be purely additive.
       - Do not include special zero-credit overrides beyond normal criterion scoring.

    7) Do not add a separate minimum-credit / attempt-credit rubric row; the host may prepend one deterministically after generation.

    <max_points>
    {{max_points}}
    </max_points>

    {{instructor_profile_xml}}

    <question_text_clean>
    {{question_text_clean}}
    </question_text_clean>

    <question_context>
    {{question_context_text}}
    </question_context>
  command_scoped_inputs:
  - name: max_points
    input_kind: text
  - name: subject
    input_kind: text
  - name: question_text_clean
    input_kind: text
  - name: question_context_text
    input_kind: text
  - name: instructor_profile_xml
    input_kind: text
  allowed_user_policy_keys: []
  execution_options:
    temperature: 0.0
    top_p: 1
    top_k: 1
    seed: 42
    num_ctx: 16384
    keep_alive: 30m
    think: false
    num_predict: 1024
  response_contract:
    type: json_schema
    additionalProperties: false
    properties:
      criteria:
        type: array
        items:
          type: object
          additionalProperties: false
          properties:
            label:
              type: string
            points:
              type: integer
              minimum: 0
            partial_credit_guidance:
              type: string
          required:
          - label
          - points
          - partial_credit_guidance
    required:
    - criteria
rubric_semantic_review:
  response_mode: json_schema
  template_text: |-
    You are reviewing candidate duplicate or overlap warnings for one exam rubric.

    You will receive:
    - The clean question text
    - The drafted rubric criteria
    - Candidate criterion pairs already flagged by local heuristics

    Your job:
    For each candidate pair, decide whether the pair is actually distinct, overlapping, or duplicative.

    Return exactly one JSON object with this shape:

    {
      "pair_reviews": [
        {
          "left_index": 1,
          "right_index": 2,
          "classification": "distinct",
          "reason": "The criteria target different evidence."
        }
      ]
    }

    Rules:
    - Review only the supplied candidate pairs.
    - Use `distinct` when the criteria are additive and should not warn.
    - Use `overlap` when the criteria could double-count similar evidence.
    - Use `duplicate` when the criteria are materially the same requirement.
    - Keep `reason` to one short sentence.
    - Return only valid JSON. No markdown, no code fences, no commentary.

    <question_text_clean>
    {{question_text_clean}}
    </question_text_clean>

    {{rubric_criteria_xml}}

    {{candidate_pairs_xml}}
  command_scoped_inputs:
  - name: question_text_clean
    input_kind: text
  - name: rubric_criteria_xml
    input_kind: text
  - name: candidate_pairs_xml
    input_kind: text
  allowed_user_policy_keys: []
  execution_options:
    temperature: 0.0
    top_p: 1
    top_k: 1
    seed: 42
    num_ctx: 16384
    keep_alive: 30m
    think: false
    num_predict: 512
  response_contract:
    type: json_schema
    additionalProperties: false
    properties:
      pair_reviews:
        type: array
        items:
          type: object
          additionalProperties: false
          properties:
            left_index:
              type: integer
              minimum: 1
            right_index:
              type: integer
              minimum: 1
            classification:
              type: string
              enum:
              - distinct
              - overlap
              - duplicate
            reason:
              type: string
          required:
          - left_index
          - right_index
          - classification
          - reason
    required:
    - pair_reviews
